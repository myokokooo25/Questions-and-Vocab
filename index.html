
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="鉄骨試験" />
    <link rel="apple-touch-icon" href="https://api.dicebear.com/7.x/fun-emoji/svg?seed=kawaii&backgroundColor=58cc02" />
    <link rel="manifest" href="/manifest.json" />
    <title>鉄骨製作管理技術者 試験対策アプリ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+Myanmar:wght@400;500;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Nunito', 'Noto Sans Myanmar', 'Noto Sans JP', 'sans-serif'],
            },
            
            colors: {
              'neumorphic-bg': 'rgb(var(--color-neumorphic-bg) / <alpha-value>)',
              'neumorphic-text': 'rgb(var(--color-neumorphic-text) / <alpha-value>)',
              slate: {
                400: 'rgb(var(--color-slate-400) / <alpha-value>)',
                500: 'rgb(var(--color-slate-500) / <alpha-value>)',
                600: 'rgb(var(--color-slate-600) / <alpha-value>)',
                700: 'rgb(var(--color-slate-700) / <alpha-value>)',
              },
              blue: {
                50: '#ddf4ff',
                100: '#b1e5ff',
                200: '#7ad4ff',
                300: '#3ac1ff',
                400: '#1cb0f6',
                500: '#1899d6',
                600: '#1cb0f6',
                700: '#1899d6',
                800: '#117baf',
                900: '#0c5b84',
              },
              green: {
                400: '#58cc02',
                500: '#58cc02',
                600: '#58a700',
                700: '#468700',
              },
              red: {
                400: '#ff4b4b',
                500: '#ff4b4b',
                600: '#ea2b2b',
                700: '#c32121',
              },
              yellow: {
                400: '#ffc800',
                500: '#ffc800',
                600: '#d9aa00',
                700: '#b28c00',
              }
            },

            boxShadow: {
              'neumorphic-outset': 'var(--shadow-outset)',
              'neumorphic-inset': 'var(--shadow-inset)',
              'neumorphic-sm': 'var(--shadow-sm)',
            }
          },
        },
      }
    </script>
    <style>

      :root {
        --color-neumorphic-bg: 255 255 255;
        --color-neumorphic-text: 75 85 99;
        --color-slate-400: 156 163 175;
        --color-slate-500: 107 114 128;
        --color-slate-600: 75 85 99;
        --color-slate-700: 55 65 81;
        
        --shadow-outset: 0 4px 0 0 #e5e7eb, 0 0 0 2px #e5e7eb;
        --shadow-inset: 0 0 0 0 #e5e7eb, 0 0 0 2px #e5e7eb;
        --shadow-sm: 0 3px 0 0 #e5e7eb, 0 0 0 2px #e5e7eb;
      }
      
      html.khachannel {
        --color-neumorphic-bg: 255 244 220;
        --color-neumorphic-text: 60 40 10;
        --shadow-outset: 0 4px 0 0 #f5d070, 0 0 0 2px #f5d070;
        --shadow-inset: 0 0 0 0 #f5d070, 0 0 0 2px #f5d070;
        --shadow-sm: 0 3px 0 0 #f5d070, 0 0 0 2px #f5d070;
      }

      html.dark {
        --color-neumorphic-bg: 19 31 36;
        --color-neumorphic-text: 255 255 255;
        --shadow-outset: 0 4px 0 0 #37464f, 0 0 0 2px #37464f;
        --shadow-inset: 0 0 0 0 #37464f, 0 0 0 2px #37464f;
        --shadow-sm: 0 3px 0 0 #37464f, 0 0 0 2px #37464f;
      }

      /* Duolingo button press effect */
      .shadow-neumorphic-inset {
         transform: translateY(4px);
      }
      .active\:shadow-neumorphic-inset:active {
         transform: translateY(4px) !important;
         box-shadow: var(--shadow-inset) !important;
      }

      /* Change border radius everywhere for cuter look */
      .rounded-2xl {
         border-radius: 1.25rem !important;
      }
      .rounded-xl {
         border-radius: 1rem !important;
      }
      .rounded-3xl {
         border-radius: 1.5rem !important;
      }
      
      /* Make inputs look like Duolingo */
      input {
         border-radius: 1rem !important;
      }

      * { transition: background-color 0.2s ease, color 0.2s ease, transform 0.1s cubic-bezier(0.4, 0, 0.2, 1); }
      html { font-size: clamp(0.9rem, 0.6rem + 0.8vw, 1.15rem); }
      ruby { font-family: inherit; font-size: inherit; }
      rt { font-size: 0.6em; user-select: none; opacity: 0.85; font-weight: 500; text-align: center; }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.26.0",
    "@vitejs/plugin-react": "https://aistudiocdn.com/@vitejs/plugin-react@^5.1.0",
    "vite": "https://aistudiocdn.com/vite@^7.2.1",
    "path": "https://aistudiocdn.com/path@^0.12.7",
    "url": "https://aistudiocdn.com/url@^0.11.4",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@^2.95.3"
  }
}
</script>
</head>
  <body class="bg-neumorphic-bg font-sans antialiased text-neumorphic-text">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
